name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Check test coverage
        working-directory: backend
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/build/reports/jacoco/test/html/

  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Build backend JAR
        working-directory: backend
        run: ./gradlew bootJar --no-daemon

      - name: Build backend Docker image
        run: docker build -t task-manager-backend:${{ github.sha }} ./backend

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run type check
        working-directory: frontend
        run: npm run type-check

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build frontend Docker image
        run: docker build -t task-manager-frontend:${{ github.sha }} ./frontend

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taskmanager_test
          POSTGRES_USER: taskmanager
          POSTGRES_PASSWORD: taskmanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Run integration tests
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: integration
          DB_URL: jdbc:postgresql://localhost:5432/taskmanager_test
          DB_USERNAME: taskmanager
          DB_PASSWORD: taskmanager
          JWT_SECRET: test-secret-key-for-ci-min-256-bits-long-here
        run: ./gradlew test --no-daemon

  docker-compose-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up --build -d postgres backend
          echo "Waiting for backend to be healthy..."
          timeout 120 bash -c 'until docker compose ps backend | grep -q "healthy"; do sleep 5; done'

      - name: Health check backend
        run: |
          curl -f http://localhost:8080/actuator/health

      - name: Tear down
        if: always()
        run: docker compose down -v
